name: llm-client-package-ci

on:
  pull_request:
    paths:
      - ".github/workflows/llm-client-package-ci.yml"
      - "docs/llm-client-*.md"
      - "examples/**"
      - "llm_client/**"
      - "pyproject.toml"
      - "scripts/ci/**"
      - "tests/llm_client/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/llm-client-package-ci.yml"
      - "docs/llm-client-*.md"
      - "examples/**"
      - "llm_client/**"
      - "pyproject.toml"
      - "scripts/ci/**"
      - "tests/llm_client/**"

permissions:
  contents: read

jobs:
  standalone-install-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Standalone import smoke
        run: |
          python -c "import llm_client; import llm_client.content; import llm_client.providers; import llm_client.agent; import llm_client.cache"

      - name: Packaging inventory smoke
        run: |
          python -m pytest -q \
            tests/llm_client/test_packaging_inventory.py

  examples-and-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install full example stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,anthropic,google,telemetry,performance,server]"

      - name: Validate docs inventories
        run: |
          python -m pytest -q \
            tests/llm_client/test_cookbook_inventory.py \
            tests/llm_client/test_guides_inventory.py \
            tests/llm_client/test_packaging_inventory.py

      - name: Run live cookbook with skip allowance
        env:
          LLM_CLIENT_EXAMPLE_ALLOW_SKIP: "1"
        run: |
          python scripts/ci/run_llm_client_examples.py --subset all

  artifact-build-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling and package dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,anthropic,google,telemetry,performance,server]"

      - name: Build wheel and sdist
        run: |
          python -m build

      - name: Verify built artifacts
        run: |
          python scripts/ci/verify_llm_client_artifacts.py

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llm-client-dist
          path: dist/*
