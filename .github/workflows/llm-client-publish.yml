name: llm-client-publish

on:
  push:
    tags:
      - "llm-client-v*"
  workflow_dispatch:
    inputs:
      repository:
        description: "Publish target"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package artifacts
        run: |
          python -m build

      - name: Check package metadata
        run: |
          python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llm-client-release-dist
          path: dist/*

  publish-testpypi:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi' }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: llm-client-release-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: ${{ startsWith(github.ref, 'refs/tags/llm-client-v') || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi') }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: llm-client-release-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
